<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkTab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: 'Nunito', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0F0F1A 0%, #1A1A2E 100%);
      color: #fff;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .logo {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
    
    .title {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .version {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }
    
    .stats {
      display: flex;
      justify-content: space-around;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      margin-bottom: 16px;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #4ECDC4;
    }
    
    .stat-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 4px;
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #FF6B6B, #EC4899);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .btn svg {
      width: 18px;
      height: 18px;
    }
    
    .footer {
      text-align: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .footer-text {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">M</div>
    <div class="title">MarkTab</div>
    <div class="version">v1.1.0</div>
  </div>
  
  <div class="stats">
    <div class="stat-item">
      <div class="stat-value" id="bookmarkCount">-</div>
      <div class="stat-label">书签</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="folderCount">-</div>
      <div class="stat-label">文件夹</div>
    </div>
  </div>
  
  <div class="actions">
    <button class="btn btn-primary" id="openNewTab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="12" y1="8" x2="12" y2="16"></line>
        <line x1="8" y1="12" x2="16" y2="12"></line>
      </svg>
      打开新标签页
    </button>
    <button class="btn btn-secondary" id="addBookmark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
      </svg>
      添加当前页面
    </button>
    <button class="btn btn-secondary" id="manageBookmarks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
      管理书签
    </button>
  </div>
  
  <div class="footer">
    <div class="footer-text">按 Ctrl+K 快速搜索</div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkTab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ========================================= -->
  <!-- HOME VIEW — Paper Launchpad                -->
  <!-- ========================================= -->
  <div class="view home-view" id="homeView" data-view="home">
    <div class="home-container">
      <!-- Top bar: clock + date, intentionally small -->
      <header class="home-topbar">
        <time class="home-clock" id="homeClock">00:00</time>
        <span class="home-date" id="homeDate" data-i18n="loadingBookmarks">Loading...</span>
      </header>

      <!-- Main hero: search is the centerpiece -->
      <div class="home-hero">
        <div class="home-search-card">
          <div class="home-search-inner">
            <svg class="home-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" id="homeSearchInput" placeholder="Search bookmarks and folders..." autocomplete="off" aria-label="Search" data-i18n-placeholder="searchBookmarksAndFolders" data-i18n-aria-label="search">
            <span class="home-search-hint-badge">⌘K</span>
          </div>
        </div>
        <div class="home-search-hints">
          <span><kbd>Enter</kbd> <span data-i18n="hintOpen">open</span></span>
          <span class="hint-dot">·</span>
          <span><kbd>Shift</kbd>+<kbd>Enter</kbd> <span data-i18n="hintWeb">web</span></span>
          <span class="hint-dot">·</span>
          <span><kbd>Esc</kbd> <span data-i18n="hintClose">close</span></span>
        </div>
      </div>

      <!-- Content sections -->
      <div class="home-sections" id="homeSections">

      <!-- Pinned -->
      <section class="home-section" id="homePinnedSection">
        <div class="home-section-label">
          <svg class="home-section-label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 17v5"></path><path d="M5 17h14"></path><path d="M15 3.6 20.4 9l-3 3 1.1 4H5.5l1.1-4-3-3L9 3.6"></path>
          </svg>
          <span data-i18n="pinned">Pinned</span>
        </div>
        <div class="home-card-grid" id="homePinnedGrid"></div>
      </section>

      <!-- Recent -->
      <section class="home-section" id="homeRecentSection">
        <div class="home-section-label home-section-label-row">
          <span class="home-section-label-left">
            <svg class="home-section-label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span data-i18n="recent">Recent</span>
          </span>
        </div>
        <div class="home-card-grid" id="homeRecentGrid"></div>
      </section>

      <!-- Folders -->
      <section class="home-section" id="homeFoldersSection">
        <div class="home-section-label">
          <svg class="home-section-label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
          <span data-i18n="folders">Folders</span>
        </div>
        <div class="home-folder-pills" id="homeFolderPills"></div>
      </section>
    </div><!-- /home-sections -->

      <!-- Loading shimmer (inside container for centering) -->
      <div class="home-loading" id="homeLoading">
        <div class="loading-dots">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
        <span data-i18n="loadingBookmarks">Loading bookmarks...</span>
      </div>
    </div><!-- /home-container -->

    <!-- Settings FAB — lower right -->
    <button class="home-fab" id="homeFab" aria-label="Settings" data-i18n-aria-label="settings">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="10" cy="10" r="2.5"></circle>
        <path d="M10 1.5v1.5M10 17v1.5M3.1 3.1l1.06 1.06M15.84 15.84l1.06 1.06M1.5 10H3M17 10h1.5M3.1 16.9l1.06-1.06M15.84 8.16l1.06-1.06"></path>
      </svg>
    </button>
  </div>

  <!-- ========================================= -->
  <!-- FOLDER VIEW (sidebar + content)            -->
  <!-- ========================================= -->
  <div class="view folder-view" id="folderView" data-view="folder" style="display:none">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar" data-i18n-aria-label="toggleSidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <aside class="folder-sidebar" id="folderSidebar">
      <div class="folder-sidebar-header">
        <button class="sidebar-brand" id="sidebarHomeBtn" aria-label="Back to home" data-i18n-aria-label="backToHome">
          <span class="sidebar-logo">M</span>
          <span class="sidebar-title">MarkTab</span>
        </button>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Populated by JS -->
      </nav>
    </aside>
    <main class="sidebar-content" id="folderContent">
      <div class="folder-toolbar">
        <div class="folder-search-box" id="folderSearchBox">
          <svg class="folder-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input type="text" id="folderSearchInput" placeholder="Search in folder..." autocomplete="off" aria-label="Search in folder" data-i18n-placeholder="searchInFolder" data-i18n-aria-label="searchInFolder">
        </div>
        <div class="folder-toolbar-actions" aria-label="Folder tools" data-i18n-aria-label="folderTools">
          <button class="folder-tool-button active" type="button" aria-label="Grid view" title="Grid view" data-i18n-aria-label="gridView" data-i18n-title="gridView">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
              <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
              <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
              <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
            </svg>
          </button>
          <button class="folder-tool-button" type="button" aria-label="Sort bookmarks" title="Sort bookmarks" data-i18n-aria-label="sortBookmarks" data-i18n-title="sortBookmarks">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M6 4v16"></path>
              <path d="m3 17 3 3 3-3"></path>
              <path d="M12 7h9"></path>
              <path d="M12 12h6"></path>
              <path d="M12 17h3"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="folder-header-area" id="folderHeaderArea">
        <h2 class="folder-title" id="folderTitle" data-i18n="folder">Folder</h2>
        <div class="folder-meta">
          <span class="folder-count" id="folderCount">0 bookmarks</span>
        </div>
      </div>
      <div class="folder-bookmarks-grid" id="folderBookmarksGrid">
        <!-- Populated by JS -->
      </div>
      <div class="folder-empty" id="folderEmpty" style="display:none">
        <div class="folder-empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <p data-i18n="thisFolderIsEmpty">This folder is empty</p>
      </div>
    </main>
  </div>

  <!-- Settings removed — FAB now cycles theme directly -->

  <!-- ========================================= -->
  <!-- SEARCH PANEL OVERLAY                      -->
  <!-- ========================================= -->
  <div class="search-panel-overlay" id="searchPanelOverlay" style="display:none">
    <div class="search-panel" id="searchPanel">
      <div class="search-panel-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" id="searchPanelInput" placeholder="Search bookmarks and folders..." autocomplete="off" aria-label="Search" spellcheck="false" data-i18n-placeholder="searchBookmarksAndFolders" data-i18n-aria-label="search">
        <button class="search-panel-clear" id="searchPanelClose" aria-label="Close search" data-i18n-aria-label="closeSearch">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="search-panel-results" id="searchPanelResults">
        <div class="search-group" id="searchGroupBookmarks">
          <div class="search-group-header" data-i18n="bookmarks">Bookmarks</div>
          <div class="search-panel-items" id="searchBookmarkItems"></div>
        </div>
        <div class="search-group" id="searchGroupFolders">
          <div class="search-group-header" data-i18n="folders">Folders</div>
          <div class="search-panel-items" id="searchFolderItems"></div>
        </div>
        <div class="search-group" id="searchGroupWeb">
          <div class="search-panel-items" id="searchWebItem"></div>
        </div>
        <div class="search-panel-empty" id="searchEmpty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="32" height="32">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <p data-i18n="startTypingToSearch">Start typing to search</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================================= -->
  <!-- TOAST                                      -->
  <!-- ========================================= -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="newtab.js"></script>
</body>
</html>

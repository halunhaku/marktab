<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkTab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 背景效果层 -->
  <div class="ambient-glow">
    <div class="glow-wash wash-1"></div>
    <div class="glow-wash wash-2"></div>
  </div>
  
  <!-- 噪点纹理 -->
  <div class="noise-overlay"></div>

  <div class="container">
    <!-- 顶部区域：时间和搜索 -->
    <header class="header">
      <div class="time-section">
        <div class="clock" id="clock">00:00</div>
        <div class="date" id="date">Loading…</div>
      </div>
      
      <div class="search-section">
        <div class="search-container">
          <div class="search-box" id="searchBox">
            <button class="engine-selector" id="engineBtn" title="Switch Search Engine" aria-label="Switch Search Engine" aria-expanded="false">
              <div class="engine-icon-wrapper">
                <span id="engineIcon" class="engine-icon-text">G</span>
              </div>
              <svg class="engine-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <div class="search-divider"></div>
            <input type="text" id="searchInput" name="bookmark-search" placeholder="Search bookmarks or the web…" autocomplete="off" aria-label="Search bookmarks or the web">
            <button class="search-clear" id="searchClear" aria-label="Clear">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
            <button class="search-submit" id="searchSubmit" aria-label="Search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
            </button>
          </div>
          
          <!-- 搜索引擎下拉菜单 -->
          <div class="engine-dropdown" id="engineDropdown">
            <div class="dropdown-arrow"></div>
            <div class="dropdown-content"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- 文件夹导航栏 -->
    <nav class="folder-nav" id="folderNav">
      <div class="folder-nav-header">
        <span class="folder-nav-label">Folders</span>
        <button class="folder-nav-toggle" id="folderNavToggle" title="Toggle All">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
      </div>
      <div class="folder-nav-content" id="folderNavContent">
        <!-- 动态生成文件夹树 -->
      </div>
    </nav>

    <!-- 书签内容区域 -->
    <main class="bookmarks-container">
      <div class="loading-state" id="loadingState">
        <div class="loading-shimmer">
          <div class="shimmer-line"></div>
          <div class="shimmer-line"></div>
          <div class="shimmer-line"></div>
        </div>
      </div>
      
      <div class="bookmarks-content" id="bookmarksContent">
        <!-- 书签将按层级分组显示 -->
      </div>
      
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <h3>No bookmarks yet</h3>
        <p>Add some bookmarks in your browser to see them here</p>
      </div>
      
      <div class="no-results" id="noResults">
        <div class="no-results-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </div>
        <h3>No matches found</h3>
        <p>Try a different search term</p>
      </div>
    </main>

    <!-- 底部信息 -->
    <footer class="footer">
      <div class="stats" id="stats">Loading...</div>
      <div class="shortcuts-hint">
        <kbd>Ctrl</kbd> + <kbd>K</kbd> focus · 
        <kbd>↑</kbd><kbd>↓</kbd> select ·
        <kbd>Enter</kbd> open ·
        <kbd>Shift</kbd> + <kbd>Enter</kbd> web
      </div>
    </footer>
  </div>

  <!-- 设置按钮 -->
  <button class="fab" id="fab" aria-label="Settings">
    <div class="fab-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </div>
    <div class="fab-glow"></div>
  </button>

  <script src="newtab.js"></script>
</body>
</html>

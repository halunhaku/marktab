<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生成图标</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      padding: 40px;
      min-height: 100vh;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 40px;
      background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }
    
    .icon-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .icon-item h3 {
      margin-bottom: 16px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
    }
    
    .icon-preview {
      background: #0f0f1a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .btn {
      background: linear-gradient(135deg, #FF6B6B, #EC4899);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4);
    }
    
    .instructions {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .instructions h2 {
      margin-bottom: 16px;
      color: #4ECDC4;
    }
    
    .instructions ol {
      padding-left: 20px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.8);
    }
    
    .instructions li {
      margin-bottom: 8px;
    }
    
    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MarkTab - 图标生成器</h1>
    
    <div class="icon-grid">
      <div class="icon-item">
        <h3>16 x 16</h3>
        <div class="icon-preview">
          <img id="img-16" width="16" height="16">
        </div>
        <button class="btn" onclick="downloadIcon(16)">下载</button>
      </div>
      
      <div class="icon-item">
        <h3>32 x 32</h3>
        <div class="icon-preview">
          <img id="img-32" width="32" height="32">
        </div>
        <button class="btn" onclick="downloadIcon(32)">下载</button>
      </div>
      
      <div class="icon-item">
        <h3>48 x 48</h3>
        <div class="icon-preview">
          <img id="img-48" width="48" height="48">
        </div>
        <button class="btn" onclick="downloadIcon(48)">下载</button>
      </div>
      
      <div class="icon-item">
        <h3>128 x 128</h3>
        <div class="icon-preview">
          <img id="img-128" width="64" height="64">
        </div>
        <button class="btn" onclick="downloadIcon(128)">下载</button>
      </div>
    </div>
    
    <div class="instructions">
      <h2>📋 使用说明</h2>
      <ol>
        <li>点击上方的「下载」按钮，分别下载 4 个尺寸的图标</li>
        <li>将下载的文件重命名为：<code>icon16.png</code>、<code>icon32.png</code>、<code>icon48.png</code>、<code>icon128.png</code></li>
        <li>将这些文件放入 <code>icons</code> 文件夹中</li>
        <li>完成！现在可以安装扩展了</li>
      </ol>
    </div>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <script>
    // SVG 图标内容
    const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#grad)"/>
  <path d="M64 28 L90 40 L90 84 C90 88 87 91 83 91 L45 91 C41 91 38 88 38 84 L38 40 L64 28Z" fill="white" opacity="0.9"/>
  <path d="M64 28 L64 91" stroke="white" stroke-width="3" opacity="0.3"/>
  <circle cx="64" cy="55" r="8" fill="white" opacity="0.8"/>
</svg>`;
    
    const svgBase64 = 'data:image/svg+xml;base64,' + btoa(svgContent);
    
    // 加载图标到页面
    const sizes = [16, 32, 48, 128];
    sizes.forEach(size => {
      const img = document.getElementById('img-' + size);
      img.src = svgBase64;
    });
    
    // 下载图标
    function downloadIcon(size) {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;
      
      const img = new Image();
      img.onload = function() {
        ctx.drawImage(img, 0, 0, size, size);
        
        const link = document.createElement('a');
        link.download = 'icon' + size + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
      img.src = svgBase64;
    }
    
    // 一键下载所有
    function downloadAll() {
      sizes.forEach((size, index) => {
        setTimeout(() => downloadIcon(size), index * 200);
      });
    }
  </script>
</body>
</html>
